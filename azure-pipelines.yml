trigger:
- main

pool:
  vmImage: Default

steps:

# Step 1: Install Terraform
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

# Step 2: Terraform Init
- script: |
    cd terraform
    terraform init
  displayName: 'Terraform Init'

# Step 3: Terraform Validate
- script: |
    cd terraform
    terraform validate
  displayName: 'Terraform Validate'
